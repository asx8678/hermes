name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  elixir:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.20'
          otp-version: '29'
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix credo
      - run: mix sobelow --skip
      - run: mix deps.audit
      - run: mix test --seed 0

  rust:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: host
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo test
